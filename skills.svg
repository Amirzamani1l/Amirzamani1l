<g class="pill" style="animation-delay:.15s"><rect x="340" y="518" width="134" height="34" rx="9" fill="#06211d" stroke="#0d9488" stroke-width="1.3" filter="url(#glow)"/><text x="407" y="540" text-anchor="middle" class="pill-text" fill="#99f6e4">DUCKY SCRIPT</text><rect class="trace" x="340" y="518" width="134" height="34" rx="9" stroke="#0d9488" stroke-dasharray="30 250" style="animation-delay:.15s"/></g>
<g class="pill" style="animation-delay:.25s"><rect x="486" y="518" width="56" height="34" rx="9" fill="#06211d" stroke="#0d9488" stroke-width="1.3" filter="url(#glow)"/><text x="514" y="540" text-anchor="middle" class="pill-text" fill="#99f6e4">GIT</text><rect class="trace" x="486" y="518" width="56" height="34" rx="9" stroke="#0d9488" stroke-dasharray="30 250" style="animation-delay:.25s"/></g>
<g class="pill" style="animation-delay:.35s"><rect x="554" y="518" width="134" height="34" rx="9" fill="#06211d" stroke="#0d9488" stroke-width="1.3" filter="url(#glow)"/><text x="621" y="540" text-anchor="middle" class="pill-text" fill="#99f6e4">HW/SW REPAIR</text><rect class="trace" x="554" y="518" width="134" height="34" rx="9" stroke="#0d9488" stroke-dasharray="30 250" style="animation-delay:.35s"/></g>
</g>
