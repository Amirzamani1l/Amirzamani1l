<g class="pill" style="animation-delay:.25s"><rect x="287" y="278" width="196" height="34" rx="9" fill="#2a0d0d" stroke="#dc2626" stroke-width="1.3" filter="url(#glow)"/><text x="385" y="300" text-anchor="middle" class="pill-text" fill="#fecaca">ALGORITHMIC TRADING</text><rect class="trace" x="287" y="278" width="196" height="34" rx="9" stroke="#dc2626" stroke-dasharray="30 250" style="animation-delay:.25s"/></g>
<g class="pill" style="animation-delay:.35s"><rect x="495" y="278" width="212" height="34" rx="9" fill="#2a0d0d" stroke="#dc2626" stroke-width="1.3" filter="url(#glow)"/><text x="601" y="300" text-anchor="middle" class="pill-text" fill="#fecaca">QUANTITATIVE ANALYSIS</text><rect class="trace" x="495" y="278" width="212" height="34" rx="9" stroke="#dc2626" stroke-dasharray="30 250" style="animation-delay:.35s"/></g>
<g class="pill" style="animation-delay:.45s"><rect x="719" y="278" width="126" height="34" rx="9" fill="#2a0d0d" stroke="#dc2626" stroke-width="1.3" filter="url(#glow)"/><text x="782" y="300" text-anchor="middle" class="pill-text" fill="#fecaca">CRYPTO BOTS</text><rect class="trace" x="719" y="278" width="126" height="34" rx="9" stroke="#dc2626" stroke-dasharray="30 250" style="animation-delay:.45s"/></g>
</g>

<text x="450" y="368" text-anchor="middle" class="cat" fill="#c4b5fd" filter="url(#glow)">SOFTWARE &amp; AI</text>
<rect x="410" y="376" width="80" height="1" fill="#7c3aed" opacity="0.5"/>
<g>
<g class="pill" style="animation-delay:.00s"><rect x="230" y="398" width="82" height="34" rx="9" fill="#180d2a" stroke="#7c3aed" stroke-width="1.3" filter="url(#glow)"/><text x="271" y="420" text-anchor="middle" class="pill-text" fill="#ddd6fe">PYTHON</text><rect class="trace" x="230" y="398" width="82" height="34" rx="9" stroke="#7c3aed" stroke-dasharray="30 250" style="animation-delay:.00s"/></g>
<g class="pill" style="animation-delay:.10s"><rect x="324" y="398" width="72" height="34" rx="9" fill="#180d2a" stroke="#7c3aed" stroke-width="1.3" filter="url(#glow)"/><text x="360" y="420" text-anchor="middle" class="pill-text" fill="#ddd6fe">FLASK</text><rect class="trace" x="324" y="398" width="72" height="34" rx="9" stroke="#7c3aed" stroke-dasharray="30 250" style="animation-delay:.10s"/></g>
<g class="pill" style="animation-delay:.20s"><rect x="408" y="398" width="82" height="34" rx="9" fill="#180d2a" stroke="#7c3aed" stroke-width="1.3" filter="url(#glow)"/><text x="449" y="420" text-anchor="middle" class="pill-text" fill="#ddd6fe">SQLITE</text><rect class="trace" x="408" y="398" width="82" height="34" rx="9" stroke="#7c3aed" stroke-dasharray="30 250" style="animation-delay:.20s"/></g>
<g class="pill" style="animation-delay:.30s"><rect x="502" y="398" width="168" height="34" rx="9" fill="#180d2a" stroke="#7c3aed" stroke-width="1.3" filter="url(#glow)"/><text x="586" y="420" text-anchor="middle" class="pill-text" fill="#ddd6fe">MACHINE LEARNING</text><rect class="trace" x="502" y="398" width="168" height="34" rx="9" stroke="#7c3aed" stroke-dasharray="30 250" style="animation-delay:.30s"/></g>
</g>

<text x="450" y="488" text-anchor="middle" class="cat" fill="#5eead4" filter="url(#glow)">SECURITY &amp; SYSTEMS</text>
<rect x="410" y="496" width="80" height="1" fill="#0d9488" opacity="0.5"/>
<g>
