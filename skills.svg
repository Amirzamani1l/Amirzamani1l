<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  .title { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 800; font-size: 30px; letter-spacing: 6px; fill: #ffb347; }
  .cat { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 3px; }
  .pill-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; font-size: 13px; }
  .pill { }
  .trace { fill: none; stroke-width: 2; stroke-linecap: round; animation: travel 3.2s linear infinite; }
  @keyframes travel { to { stroke-dashoffset: -400; } }
  .glowbar { animation: pulse 2.6s ease-in-out infinite; }
  .ring { animation: pulse 2.6s ease-in-out infinite; }
  .corner { stroke: #f5a623; stroke-width: 2; fill: none; opacity: .8; }
  .grid { stroke: #ffffff; stroke-opacity: .035; stroke-width: 1; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .25; }
  }
  @keyframes drift {
    0% { transform: translateX(0); }
    50% { transform: translateX(14px); }
    100% { transform: translateX(0); }
  }
  @keyframes glowshift {
    0%, 100% { stop-color: #f5a623; }
    50% { stop-color: #dc2626; }
  }

  @keyframes glitch {
    0%, 92%, 100% { transform: translate(0,0); opacity: 0; }
    93% { transform: translate(-3px,1px); opacity: .8; }
    95% { transform: translate(3px,-1px); opacity: .8; }
    97% { transform: translate(-2px,0); opacity: .6; }
  }
  @keyframes scan {
    0% { transform: translateY(-40px); }
    100% { transform: translateY(640px); }
  }

  .ember { animation: rise linear infinite; }
  @keyframes rise {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: .9; }
    90% { opacity: .5; }
    100% { transform: translateY(-560px); opacity: 0; }
  }
</style>

<radialGradient id="bgGrad" cx="50%" cy="15%" r="90%">
  <stop offset="0%" stop-color="#161022"/>
  <stop offset="45%" stop-color="#0a0713"/>
  <stop offset="100%" stop-color="#020103"/>
</radialGradient>

<radialGradient id="vignette" cx="50%" cy="50%" r="75%">
  <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
  <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
</radialGradient>

<linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#f5a623"><animate attributeName="stop-color" values="#f5a623;#dc2626;#7c3aed;#0d9488;#f5a623" dur="8s" repeatCount="indefinite"/></stop>
  <stop offset="100%" stop-color="#7c3aed"><animate attributeName="stop-color" values="#7c3aed;#0d9488;#f5a623;#dc2626;#7c3aed" dur="8s" repeatCount="indefinite"/></stop>
</linearGradient>

<filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
  <feGaussianBlur stdDeviation="4" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
  <feGaussianBlur stdDeviation="8" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>
<linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
  <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05"/>
  <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="900" height="600" rx="18" fill="url(#bgGrad)"/>
<rect x="0" y="0" width="900" height="600" rx="18" fill="url(#vignette)"/>

<g clip-path="none">
  <g style="animation: drift 12s ease-in-out infinite;">
    <line class="grid" x1="0" y1="60" x2="900" y2="60"/>
    <line class="grid" x1="0" y1="180" x2="900" y2="180"/>
    <line class="grid" x1="0" y1="300" x2="900" y2="300"/>
    <line class="grid" x1="0" y1="420" x2="900" y2="420"/>
    <line class="grid" x1="0" y1="540" x2="900" y2="540"/>
  </g>
</g>

<rect x="3" y="3" width="894" height="594" rx="16" fill="none" stroke="url(#frameGrad)" stroke-width="5" opacity="0.22" filter="url(#softglow)"/>
<rect x="3" y="3" width="894" height="594" rx="16" fill="none" stroke="url(#frameGrad)" stroke-width="2" opacity="0.55"/>

<path class="corner" d="M24 60 L24 24 L60 24"/>
<path class="corner" d="M876 60 L876 24 L840 24"/>
<path class="corner" d="M24 540 L24 576 L60 576"/>
<path class="corner" d="M876 540 L876 576 L840 576"/>

<text x="450" y="58" text-anchor="middle" class="title" filter="url(#softglow)">ARSENAL</text>
<rect class="glowbar" x="370" y="72" width="160" height="2.5" fill="#ffb347" filter="url(#glow)"/>
<text x="447" y="58" text-anchor="middle" class="title" fill="#ffb347" style="animation: glitch 6s infinite; opacity:0;">ARSENAL</text>
<text x="453" y="58" text-anchor="middle" class="title" fill="#dc2626" style="animation: glitch 6s infinite .1s; opacity:0;">ARSENAL</text>
<rect x="0" y="0" width="900" height="40" fill="url(#scanGrad)" style="animation: scan 5s linear infinite;"/>

<text x="450" y="128" text-anchor="middle" class="cat" fill="#93c5fd" filter="url(#glow)">HARDWARE &amp; EMBEDDED</text>
<rect x="410" y="136" width="80" height="1" fill="#2563eb" opacity="0.5"/>
<g>
<g class="pill" style="animation-delay:.00s"><rect x="126" y="158" width="38" height="34" rx="9" fill="#0c1830" stroke="#2563eb" stroke-width="1.3" filter="url(#glow)"/><text x="145" y="180" text-anchor="middle" class="pill-text" fill="#bfdbfe">C</text><rect class="trace" x="126" y="158" width="38" height="34" rx="9" stroke="#2563eb" stroke-dasharray="30 250" style="animation-delay:.00s"/></g>
<g class="pill" style="animation-delay:.10s"><rect x="176" y="158" width="56" height="34" rx="9" fill="#0c1830" stroke="#2563eb" stroke-width="1.3" filter="url(#glow)"/><text x="204" y="180" text-anchor="middle" class="pill-text" fill="#bfdbfe">C++</text><rect class="trace" x="176" y="158" width="56" height="34" rx="9" stroke="#2563eb" stroke-dasharray="30 250" style="animation-delay:.10s"/></g>
<g class="pill" style="animation-delay:.20s"><rect x="244" y="158" width="90" height="34" rx="9" fill="#0c1830" stroke="#2563eb" stroke-width="1.3" filter="url(#glow)"/><text x="289" y="180" text-anchor="middle" class="pill-text" fill="#bfdbfe">ARDUINO</text><rect class="trace" x="244" y="158" width="90" height="34" rx="9" stroke="#2563eb" stroke-dasharray="30 250" style="animation-delay:.20s"/></g>
<g class="pill" style="animation-delay:.30s"><rect x="346" y="158" width="132" height="34" rx="9" fill="#0c1830" stroke="#2563eb" stroke-width="1.3" filter="url(#glow)"/><text x="412" y="180" text-anchor="middle" class="pill-text" fill="#bfdbfe">MICROPYTHON</text><rect class="trace" x="346" y="158" width="132" height="34" rx="9" stroke="#2563eb" stroke-dasharray="30 250" style="animation-delay:.30s"/></g>
<g class="pill" style="animation-delay:.40s"><rect x="490" y="158" width="56" height="34" rx="9" fill="#0c1830" stroke="#2563eb" stroke-width="1.3" filter="url(#glow)"/><text x="518" y="180" text-anchor="middle" class="pill-text" fill="#bfdbfe">ROS</text><rect class="trace" x="490" y="158" width="56" height="34" rx="9" stroke="#2563eb" stroke-dasharray="30 250" style="animation-delay:.40s"/></g>
<g class="pill" style="animation-delay:.50s"><rect x="558" y="158" width="82" height="34" rx="9" fill="#0c1830" stroke="#2563eb" stroke-width="1.3" filter="url(#glow)"/><text x="599" y="180" text-anchor="middle" class="pill-text" fill="#bfdbfe">TINYML</text><rect class="trace" x="558" y="158" width="82" height="34" rx="9" stroke="#2563eb" stroke-dasharray="30 250" style="animation-delay:.50s"/></g>
<g class="pill" style="animation-delay:.60s"><rect x="652" y="158" width="122" height="34" rx="9" fill="#0c1830" stroke="#2563eb" stroke-width="1.3" filter="url(#glow)"/><text x="713" y="180" text-anchor="middle" class="pill-text" fill="#bfdbfe">PCB DESIGN</text><rect class="trace" x="652" y="158" width="122" height="34" rx="9" stroke="#2563eb" stroke-dasharray="30 250" style="animation-delay:.60s"/></g>
</g>

<text x="450" y="248" text-anchor="middle" class="cat" fill="#fca5a5" filter="url(#glow)">TRADING &amp; QUANT</text>
<rect x="410" y="256" width="80" height="1" fill="#dc2626" opacity="0.5"/>
<g>
<g class="pill" style="animation-delay:.05s"><rect x="55" y="278" width="126" height="34" rx="9" fill="#2a0d0d" stroke="#dc2626" stroke-width="1.3" filter="url(#glow)"/><text x="118" y="300" text-anchor="middle" class="pill-text" fill="#fecaca">PINE SCRIPT</text><rect class="trace" x="55" y="278" width="126" height="34" rx="9" stroke="#dc2626" stroke-dasharray="30 250" style="animation-delay:.05s"/></g>
