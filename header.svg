<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120" role="img" aria-label="Connect">
  <defs>
    <linearGradient id="hb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0a0c"/>
      <stop offset="50%"  stop-color="#150e0e"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f5a623" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#dc2626"  stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#f5a623"/>
      <stop offset="80%"  stop-color="#dc2626"  stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <filter id="hglow" x="-40%" y="-140%" width="180%" height="380%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="hgrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="#f5a623" stroke-width="0.4" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="900" height="120" fill="url(#hb)"/>
  <rect width="900" height="120" fill="url(#hgrid)"/>

  <g filter="url(#hglow)">
    <text x="450.0" y="52" text-anchor="middle"
          font-family="'Fira Code','JetBrains Mono',ui-monospace,monospace"
          font-size="30" font-weight="700" letter-spacing="9" fill="#f5a623">CONNECT</text>
  </g>

  <text x="450.0" y="78" text-anchor="middle"
        font-family="'Fira Code',ui-monospace,monospace"
        font-size="12" letter-spacing="4" fill="#dc2626">
    // ESTABLISHING UPLINK &#8212; AMIR ZAMANI
  </text>

  <rect x="80" y="94" width="740" height="1.6" fill="url(#rule)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <g fill="#f5a623">
    <circle cx="150.0" cy="94.8" r="2.4">
      <animate attributeName="cx" values="150.0;750.0;150.0"
               dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
